name: V2Ray Link Cleaner

on:
  # اجرای زمان‌بندی شده هر ۵ ساعت یکبار (UTC)
  # توی این تنظیمات، اجرا در ساعت‌های 0، 5، 10، 15، 20 (به وقت جهانی)
  # یعنی طبق فرمت cron: دقیقه 0 از هر ساعت 5 ام
  schedule:
    - cron: '0 */5 * * *'   # هر ۵ ساعت یکبار
  # دکمه اجرای دستی (برای تست)
  workflow_dispatch:

jobs:
  run-checker:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 دریافت کد از مخزن
        uses: actions/checkout@v4

      - name: 🐍 نصب پایتون
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 نصب وابستگی‌ها
        run: pip install -r requirements.txt

      - name: 🚀 اجرای چکر لینک‌ها
        run: python sub_link_checker.py

      - name: 💾 ذخیره خروجی (اختیاری)
        uses: actions/upload-artifact@v4
        with:
          name: cleaned-configs
          path: cleaned_configs.txt
