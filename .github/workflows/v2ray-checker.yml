name: V2Ray Config Tester (Daily)

on:
  schedule:
    - cron: '0 0 * * *'        # هر روز ساعت 00:00 UTC
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-configs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests colorama urllib3 jdatetime beautifulsoup4
      - name: Step 1 – Clean configs from pool_address
        run: python sub_link_checker.py
      - name: Step 2 – Test configs (batch 7000, auto-commit)
        run: python success_config.py
      - name: Step 3 – Final README update (just in case)
        run: python update_readme.py
      - name: Final commit & push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add cleaned_configs.txt success_config.txt link_stats.json README.md
          git diff --staged --quiet || git commit -m "Final daily update - $(date '+%Y-%m-%d %H:%M:%S')"
          git push
