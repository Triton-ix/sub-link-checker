name: V2Ray Link Cleaner & Tester

on:
  schedule:
    - cron: '0 0 * * *'      # هر ۲۴ ساعت یکبار
  workflow_dispatch:            # قابلیت اجرای دستی

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-checker:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: دریافت کد از مخزن
        uses: actions/checkout@v4

      - name: نصب پایتون
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: نصب کتابخانه‌های مورد نیاز
        run: |
          python -m pip install --upgrade pip
          pip install requests colorama urllib3

      - name: مرحله ۱ - پاکسازی و استخراج کانفیگ‌ها
        run: python sub_link_checker.py

      - name: مرحله ۲ - تست کانفیگ‌ها و استخراج سالم‌ها
        run: python success_config.py

      - name: ذخیره خودکار هر دو فایل خروجی در مخزن
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add cleaned_configs.txt success_config.txt
          git diff --staged --quiet || git commit -m "Auto-update configs - $(date '+%Y-%m-%d %H:%M:%S')"
          git push
