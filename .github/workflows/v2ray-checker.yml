name: V2Ray Subscription Updater

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-checker:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests colorama urllib3 jdatetime
      - name: Step 1 - Clean configs
        run: python sub_link_checker.py
      - name: Step 2 - Test configs
        run: python success_config.py
      - name: Step 3 - Generate README
        run: python update_readme.py
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cleaned_configs.txt success_config.txt link_stats.json README.md
          git diff --staged --quiet || git commit -m "Auto-update configs"
          git push
