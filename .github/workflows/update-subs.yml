name: Update Subscription Links (Every 5 Days)

on:
  schedule:
    - cron: '0 0 */5 * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-subs:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: دریافت کد از مخزن
        uses: actions/checkout@v4

      - name: نصب پایتون
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: نصب کتابخانه‌های مورد نیاز
        run: |
          python -m pip install --upgrade pip
          pip install requests colorama

      - name: جستجو و به‌روزرسانی لینک‌های ساب‌اسکریپشن
        run: python find_sub_links.py

      - name: ذخیره تغییرات در مخزن
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add pool_address.txt
          git diff --staged --quiet || git commit -m "Auto-update subscription links - $(date '+%Y-%m-%d %H:%M:%S')"
          git push
