name: Find V2Ray Subscription Links

on:
  schedule:
    - cron: '0 0 */5 * *'   # هر 5 روز یکبار ساعت 00:00 UTC
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  find-links:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: دریافت کد مخزن
        uses: actions/checkout@v4

      - name: نصب پایتون
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: نصب کتابخانه‌های مورد نیاز
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: اجرای اسکریپت جستجوی لینک‌ها
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python find_sub_links.py

      - name: commit و push تغییرات pool_address.txt
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add pool_address.txt
          git diff --staged --quiet || git commit -m "Auto-update subscription links - $(date '+%Y-%m-%d')"
          git push
