name: Update Subscription Links (Every 5 Days)

on:
  schedule:
    - cron: '0 0 */5 * *'   # هر ۵ روز یکبار ساعت 00:00 UTC
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-links:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4
      - name: Run subscription finder
        run: python find_subscriptions.py
      - name: Commit and push updated pool_address.txt
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add pool_address.txt
          git diff --staged --quiet || git commit -m "Auto-update pool_address.txt - $(date '+%Y-%m-%d')"
          git push
