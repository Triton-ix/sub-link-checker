name: v2ray Subscription Updater

# 1. زمان اجرای اسکریپت (Scheduled Trigger)
on:
  schedule:
    # هر ۵ ساعت یه بار اجرا شود. (cron expression به فرمت UTC)
    # معادل هر ۵ ساعت یکبار
    - cron: '0 */5 * * *'
  # امکان اجرای دستی هم وجود داره
  workflow_dispatch:

# 2. تعیین دسترسی‌ها
permissions:
  contents: write

jobs:
  update-configs:
    runs-on: ubuntu-latest

    steps:
      # 3. خارج کردن کدهای مخزن از گیت‌هاب
      - name: Checkout repository
        uses: actions/checkout@v4

      # 4. نصب Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 5. نصب کتابخونه‌های مورد نیاز (سالم‌ترین روش)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests colorama

      # 6. اجرای اسکریپت پایتون
      - name: Run V2Ray cleaner script
        # دستور اجرای پایتون به همراه نام فایل اسکریپتت
        run: python v2ray_cleaner.py

      # 7. ذخیره تغییرات و ارسال به مخزن
      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # فایل خروجی (cleaned_configs.txt) رو به گیت اضافه کن
          git add cleaned_configs.txt
          
          # اگر فایل دیگه‌ای هم تغییر کرده (مثل pool_address.txt)، اون رو هم اضافه کن
          git add -u

          # فقط اگه تغییری وجود داشت، Commit و Push کن
          if ! git diff --staged --quiet; then
            git commit -m "Auto-update V2Ray configs"
            git push origin HEAD
          else
            echo "No changes to commit."
          fi
